<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotes For Life</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>💀 Quotes For Life</h1>
  <p class="subtitle">ft. Sameer Fuddi</p>

  <div id="quote-box">
    <p id="quote-text">Click the button to get a quote!</p>
    <small id="quote-id"></small>
  </div>

  <button id="btn-random">Get Random Quote</button>

  <hr />

  <h2>Search by ID</h2>
  <input type="number" id="id-input" placeholder="Enter quote ID (1–17)" min="1" />
  <button id="btn-search">Search</button>
  <p id="search-result"></p>

  <script src="app.js"></script>
</body>
</html>
